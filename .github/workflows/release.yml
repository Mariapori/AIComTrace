name: Build and Release VSIX

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install vsce
        run: npm install -g @vscode/vsce

      - name: Read version from package.json
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          SHORT_SHA=${GITHUB_SHA::7}
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "short_sha=${SHORT_SHA}" >> $GITHUB_OUTPUT
          echo "tag=v${VERSION}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Package VSIX
        run: vsce package --no-dependencies -o aicomtrace-${{ steps.version.outputs.version }}-${{ steps.version.outputs.short_sha }}.vsix

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: AIComTrace ${{ steps.version.outputs.version }} (${{ steps.version.outputs.short_sha }})
          body: |
            Automated build from commit ${{ github.sha }}

            **Commit message:** ${{ github.event.head_commit.message }}

            ## Installation
            1. Download the `.vsix` file below
            2. In VS Code: `Extensions` → `...` → `Install from VSIX...`
          files: aicomtrace-*.vsix
          generate_release_notes: false
